# https://taskfile.dev
# Cross-platform build automation for the Veles project

version: "3"

tasks:
  default:
    cmds:
      - task: run

  build:
    sources:
      - ./CMakeLists.txt
      - ./src/*.c
      - ./glsl/*.glsl
    # IMPORTANT: Use {{exeExt}} template variable for executable extension
    # This automatically appends .exe on Windows, nothing on Unix/macOS
    # Ensures cross-platform compatibility in generates declaration
    generates:
      - ./veles{{exeExt}}
    platforms:
      - linux
      - darwin
      - windows
    cmds:
      # Clean old build artifacts using cmake -E (cross-platform)
      # REASON: cmake -E rm is cross-platform, unlike rm -rf (Unix-only)
      # HISTORY: Previously used 'rm -rf' which failed on Windows
      # ignore_error: true ensures build continues even if directories don't exist
      - cmd: cmake -E rm -rf ./build/ ./Debug/
        ignore_error: true
      
      # Configure with CMake using vcpkg toolchain
      # CRITICAL: Platform-specific environment variable syntax
      # 
      # Unix/macOS: Use $VCPKG_ROOT (standard shell variable expansion)
      # Windows: Use $$env:VCPKG_ROOT (escaped $ for Task, then PowerShell syntax)
      # 
      # HISTORY OF WINDOWS SYNTAX ATTEMPTS:
      # 1. Tried: "${env:VCPKG_ROOT}" (with braces)
      #    Failed: Literal string "/scripts/buildsystems/vcpkg.cmake" - braces don't work in this context
      #    Error: "Could not find toolchain file: /scripts/buildsystems/vcpkg.cmake"
      # 2. Tried: "$env:VCPKG_ROOT" (without braces)
      #    Failed: Task interprets $ as its own template syntax, strips "$env:", leaves ":VCPKG_ROOT"
      #    Error: "Could not find toolchain file: :VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
      # 3. CURRENT: "$$env:VCPKG_ROOT" (escaped $ for Task)
      #    The double $$ tells Task to pass a literal $ to PowerShell, which then evaluates $env:VCPKG_ROOT
      # 
      # NOTE: VCPKG_ROOT must be set in environment before running task
      # - In CI: Set explicitly in workflow env section
      # - Locally: Set manually or via lukka/run-vcpkg action
      # 
      # PREVIOUS APPROACHES THAT FAILED:
      # - Auto-detection with: export VCPKG_BIN="$(which vcpkg)"
      #   Problem: Unreliable, complex shell logic, platform-specific
      # - Using $HOME/vcpkg hardcoded path
      #   Problem: $HOME not expanded when passed as env var, inconsistent setup
      - cmd: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
        platforms: [linux, darwin]
      - cmd: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
        platforms: [windows]
      
      # Build with CMake
      # --config Release ensures Release build even on multi-config generators (MSVC)
      - cmd: cmake --build build --config Release

  glsl:
    sources:
      - ./glsl/*.glsl
    cmds:
      # GLSL 3.30 syntax-only check
      # This validates GLSL shader syntax without compiling to SPIR-V
      # Flags:
      #  -S frag   = treat file as fragment shader
      #  -l        = list generated intermediate; good for debugging
      #  -Od       = no optimisations (faster compile); drop if you want spir-v output
      - cmd: |
          glslangValidator -S frag -l -Od ./glsl/main.frag.glsl
      # vertex shader the same way
      - cmd: |
          glslangValidator -S vert -l -Od ./glsl/main.vert.glsl

  run:
    deps: [build, glsl]
    cmds:
      # Run the executable using {{exeExt}} for cross-platform path
      # HISTORY: Previously had platform-specific commands (./veles vs .\veles.exe)
      # CURRENT: Single command using {{exeExt}} template works on all platforms
      # NOTE: On Windows, ./veles.exe works fine (PowerShell accepts forward slashes)
      - cmd: ./veles{{exeExt}} {{.CLI_ARGS}}
