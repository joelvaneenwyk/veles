# https://taskfile.dev

version: "3"

tasks:
  default:
    cmds:
      - cmd: |
          rm -rf ./build/
          rm -rf ./Debug/
      - cmd: |
          export VCPKG_BIN="$(which vcpkg)"
          export VCPKG_ROOT="$(dirname "$VCPKG_BIN")/../apps/vcpkg/current"
          if ! cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"; then
            rm -rf build
            cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          fi
      - cmd: |
          cmake --build build --config Release

  glsl:
    cmds:
      # GLSL 3.30 syntax-only check
      #  -S frag   = treat file as fragment shader
      #  -l        = list generated intermediate; good for debugging
      #  -Od       = no optimisations (faster compile); drop if you want spir-v output
      - cmd: |
          glslangValidator -S frag -l -Od ./glsl/main.frag.glsl
      # vertex shader the same way
      - cmd: |
          glslangValidator -S vert -l -Od ./glsl/main.vert.glsl
