# https://taskfile.dev

version: "3"

tasks:
  default:
    cmds:
      - task: run

  build:
    sources:
      - ./CMakeLists.txt
      - ./src/*.c
      - ./glsl/*.glsl
    generates:
      - ./veles{{exeExt}}
    platforms:
      - linux
      - darwin
      - windows
    cmds:
      # Clean old build artifacts using cmake -E (cross-platform)
      - cmd: cmake -E rm -rf ./build/ ./Debug/
        ignore_error: true
      # Configure with CMake - VCPKG_ROOT should be set by environment or lukka/run-vcpkg
      - cmd: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
        platforms: [linux, darwin]
      - cmd: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="${env:VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
        platforms: [windows]
      # Build with CMake
      - cmd: cmake --build build --config Release

  glsl:
    sources:
      - ./glsl/*.glsl
    cmds:
      # GLSL 3.30 syntax-only check
      #  -S frag   = treat file as fragment shader
      #  -l        = list generated intermediate; good for debugging
      #  -Od       = no optimisations (faster compile); drop if you want spir-v output
      - cmd: |
          glslangValidator -S frag -l -Od ./glsl/main.frag.glsl
      # vertex shader the same way
      - cmd: |
          glslangValidator -S vert -l -Od ./glsl/main.vert.glsl

  run:
    deps: [build, glsl]
    cmds:
      - cmd: ./veles{{exeExt}} {{.CLI_ARGS}}
